name: Release

on:
    release:
        types: [published]

env:
    NODE_VERSION: 24

concurrency:
    group: 'deploy'
    cancel-in-progress: false

jobs:
    build-and-deploy:
        name: Build and Deploy
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.release.tag_name }}

            - uses: pnpm/action-setup@v5

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  wranglerVersion: '4'
                  command: pages deploy .svelte-kit/cloudflare --project-name=ariadnes-thread

            - name: Create build artifact
              run: tar -czvf build-${{ github.event.release.tag_name }}.tar.gz .svelte-kit/cloudflare/

            - name: Upload to Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload ${{ github.event.release.tag_name }} \
                    build-${{ github.event.release.tag_name }}.tar.gz \
                    --clobber

    release-summary:
        name: Release Summary
        runs-on: ubuntu-latest
        needs: [build-and-deploy]
        steps:
            - name: Summary
              run: |
                  echo "## Release ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Release published successfully!" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
                  echo "- Build archive: build-${{ github.event.release.tag_name }}.tar.gz" >> $GITHUB_STEP_SUMMARY
                  echo "- Cloudflare Pages: Deployed" >> $GITHUB_STEP_SUMMARY
