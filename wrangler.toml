name = "ariadnes-thread"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-03-31"
compatibility_flags = ["nodejs_als"]

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

# Environment variables: all have Zod defaults in env.server.ts.
# Override per-environment in the Cloudflare dashboard or below.

# Secrets (set via Cloudflare dashboard or `wrangler secret put`):
# - RESEND_API_KEY: Email sending via Resend (optional)
# - TURNSTILE_SECRET_KEY: Cloudflare Turnstile server verification (optional)
#
# Public env vars (safe to commit):
# - PUBLIC_TURNSTILE_SITE_KEY: Turnstile widget site key

[env.preview.vars]
MODRINTH_USER_AGENT = "AriadnesThread/preview"
# PUBLIC_TURNSTILE_SITE_KEY = "1x00000000000000000000AA"  # Turnstile test key for preview
